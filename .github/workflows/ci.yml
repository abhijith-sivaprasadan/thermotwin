name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & test (gfortran, Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install gfortran and g++
        run: sudo apt-get install -y gfortran g++

      - name: Build engine + CLI
        run: make -j$(nproc)

      - name: Build unit tests
        run: make tests -j$(nproc)

      - name: Run unit tests and physics selftest
        run: python3 scripts/run_tests.py

      - name: Scenario regression suite
        run: |
          for scn in cases/scenarios/*.scn; do
            echo "--- $scn"
            ./thermotwin scenario run "$scn"
          done
